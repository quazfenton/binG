# Development Docker Compose Configuration
# Optimized for local development with hot-reload

version: '3.8'

services:
  # ===========================================
  # Next.js Application (Development Mode)
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: bing-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WEBSOCKET_PORT=8080
      - STORAGE_TYPE=local
      - LOCAL_SNAPSHOT_DIR=/tmp/snapshots
      - WORKSPACE_DIR=/tmp/workspaces
      - RUNTIME_TYPE=process
      
      # Authentication (dev keys)
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      
      # Logging
      - LOG_LEVEL=debug
      - LOG_FORMAT=pretty
      
      # Hot reload
      - WATCHPACK_POLLING=true
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/.next
      - app-workspaces:/tmp/workspaces
      - app-snapshots:/tmp/snapshots
    command: npm run dev
    networks:
      - bing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/backend/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # MinIO (S3-Compatible Storage)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: bing-minio-dev
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - bing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Prometheus (Metrics Collection)
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: bing-prometheus-dev
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - bing-network

  # ===========================================
  # Grafana (Metrics Visualization)
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    container_name: bing-grafana-dev
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - bing-network

  # ===========================================
  # Redis (Session Cache - Optional)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: bing-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - bing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================
  # Microsandbox (Local Sandbox Provider)
  # ===========================================
  microsandbox:
    image: node:20-alpine
    container_name: bing-microsandbox-dev
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - NODE_ENV=development
      - MSB_PORT=5555
      - MSB_MAX_INSTANCES=50
      - MSB_INSTANCE_TTL_HOURS=1
      - WORKSPACE_DIR=/workspace
      - MICROSANDBOX_ALLOW_LOCAL_FALLBACK=true
    volumes:
      - microsandbox-workspaces:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "
      npm install -g microsandbox &&
      msb server start --dev --port 5555
      "
    networks:
      - bing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - app

# ===========================================
# Networks
# ===========================================
networks:
  bing-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  app-workspaces:
    driver: local
  app-snapshots:
    driver: local
  minio-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local
  microsandbox-workspaces:
    driver: local
