name: 🧠 Autobot
on:
  pull_request_review_comment:
    types: [created]

jobs:
  # Job 1: Collect and batch trigger comments
  collect-comments:
    if: contains(github.event.comment.body, '@autobot fix') || contains(github.event.comment.body, '/autofix')
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.batch.outputs.should_run }}
      comment_ids: ${{ steps.batch.outputs.comment_ids }}
      trigger_comments: ${{ steps.batch.outputs.trigger_comments }}
    steps:
      - name: Get PR and Batch Info
        id: batch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.number }}
          TRIGGER_COMMENT_ID=${{ github.event.comment.id }}
          
          # Fetch all trigger comments on this PR in the last 30 minutes
          COMMENTS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments \
            --jq '[.[] | select(.body | test("@autobot fix|/autofix"; "i")) | select(.created_at > (now - 1800 | todate))]')
          
          COMMENT_COUNT=$(echo "$COMMENTS" | jq 'length')
          COMMENT_IDS=$(echo "$COMMENTS" | jq -r '.[].id | tostring' | tr '\n' ',')
          
          echo "Found $COMMENT_COUNT trigger comments"
          echo "comment_count=$COMMENT_COUNT" >> $GITHUB_OUTPUT
          echo "comment_ids=$COMMENT_IDS" >> $GITHUB_OUTPUT
          
          # Batch mode: Run only if we have 3+ comments OR if this is the oldest comment (batch leader)
          # Or run immediately if only 1 comment exists
          if [ "$COMMENT_COUNT" -ge 3 ] || [ "$COMMENT_COUNT" -eq 1 ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Running agent with $COMMENT_COUNT batched comments"
          else
            # Check if we're the oldest (should run) or waiting for more
            OLDEST_ID=$(echo "$COMMENTS" | jq -r '.[0].id')
            if [ "$TRIGGER_COMMENT_ID" = "$OLDEST_ID" ]; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "Oldest comment - running agent"
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "Waiting for more comments or batch timeout..."
            fi
          fi
          
          # Extract all trigger comment bodies for context
          TRIGGER_BODIES=$(echo "$COMMENTS" | jq -r '.[].body' | paste -sd $'\n')
          echo "trigger_comments<<EOF" >> $GITHUB_OUTPUT
          echo "$TRIGGER_BODIES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # Job 2: Run agent with batched context
  multi-iteration-fix:
    needs: collect-comments
    if: needs.collect-comments.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Get Pull Request Data
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.number }})
          echo "head_ref=$(echo "$PR_DATA" | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          echo "base_ref=$(echo "$PR_DATA" | jq -r '.base.ref')" >> $GITHUB_OUTPUT
          
          # Store the trigger comment URL for reference
          echo "comment_url=${{ github.event.comment.html_url }}" >> $GITHUB_OUTPUT
          echo "comment_id=${{ github.event.comment.id }}" >> $GITHUB_OUTPUT

      - name: Checkout Full Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0 # CRITICAL: Required for AST Repo Mapping

      - name: Setup Python & Agent Tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Aider (Agent Engine)
        run: python -m pip install aider-chat

      - name: Extract CodeRabbit Context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Grabs the last 100 lines of CodeRabbit feedback to give the agent its mission
          # SECURITY: Uses gh api to fetch only verified bot reviews, preventing prompt injection from malicious PR comments
          # SECURITY: Anchored regex with optional [bot] suffix to prevent substring matches
          BOT_PATTERN="^(coderabbitai|qodo-code-review|cubic-dev-ai|codeant-ai)(\\[bot\\])?$"

          # Fetch only NEW unprocessed reviews from verified bot accounts
          # Filters out reviews that already contain the agent applied marker
          # Gets last 10 complete reviews (not line-count limited to avoid truncation)
          RAW_FEEDBACK=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.number }}/reviews \
            --jq '[.[] | select(.user.login | test("'"$BOT_PATTERN"'"; "i")) | select(.state == "COMMENTED" or .state == "CHANGES_REQUESTED") | select(.body | contains("Agent:") | not)] | .[-10:] | .[].body' \
            | tac)
          SUGGESTIONS=${RAW_FEEDBACK:-Review the suggestion if there is any for optimizations.}

          # Sanitize string for bash multiline
          echo "suggestions<<EOF" >> $GITHUB_OUTPUT
          echo "$SUGGESTIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Manage Shadow Branch
        run: |
          FIX_BRANCH="ai-fixes-${{ steps.pr.outputs.head_ref }}"
          git config user.name "jarvis"
          git config user.email "fullmetal@solo-dev.internal"

          # If the branch exists remotely, fetch it and hard reset to the current PR state
          if git ls-remote --heads origin $FIX_BRANCH | grep -q $FIX_BRANCH; then
            echo "Shadow branch exists. Syncing..."
            git fetch origin $FIX_BRANCH
            git checkout $FIX_BRANCH
            git reset --hard origin/${{ steps.pr.outputs.head_ref }}
          else
            echo "Creating new shadow branch..."
            git checkout -b $FIX_BRANCH
          fi

      - name: Multi-Iteration Agent Execution & Fallback Routing
        env:
          # API Keys from your GitHub Repo/Org Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          BATCH_COMMENTS: ${{ needs.collect-comments.outputs.trigger_comments }}
          PROMPT: |
            "You are an expert Staff Engineer. Analyze the whole repo context.
            Here is the CodeRabbit review context: ${{ steps.context.outputs.suggestions }}
            
            Additional batched trigger comments from reviewers:
            ${{ needs.collect-comments.outputs.trigger_comments }}
            
            Apply these fixes, ensure Postgres/Terraform logic is intact, and verify type safety.
            Group related changes together logically."
        run: |
          # Function to run the agent in CI mode (no user prompt, auto-apply, repo map enabled)
          run_agent() {
            local MODEL=$1
            local API_BASE_ARG=$2
            echo "Attempting execution with model: $MODEL"

            # Aider runs multiple iterations under the hood if it needs to fix lint errors it caused
            aider --model "$MODEL" $API_BASE_ARG --message "$PROMPT" --yes --no-auto-commits --dark-mode
          }

          # 1. Primary: Gemini 3.1 Pro
          if ! run_agent "gemini/gemini-3.1-pro" ""; then
            echo "Gemini 3.1 Pro failed or hit rate limit. Fallback 1: Gemini Flash"

            # 2. Fallback: Gemini 3.0 Flash
            if ! run_agent "gemini/gemini-3.0-flash" ""; then
              echo "Gemini Flash failed. Fallback 2: Mistral Large"

              # 3. Fallback: Mistral
              if ! run_agent "mistral/mistral-large-latest" ""; then
                echo "Mistral failed. Fallback 3: Minimax (OpenCode Zen)"

                # 4. Fallback: Minimax 2.5 Max (Using OpenAI compatible routing)
                export OPENAI_API_KEY=$OPENCODE_API_KEY
                run_agent "opencode/minimax-m2.5-free" "--openai-api-base https://opencode.ai/zen/v1/chat/completions"
              fi
            fi
          fi

      - name: Commit and Force-Push Fixes
        id: commit
        run: |
          git add .

          # Only commit and push if the Agent actually changed files
          if ! git diff-index --quiet HEAD; then
            # Get list of changed files
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD | jq -R -s -c 'split("\n")[:-1]')
            
            # Get all trigger comment IDs and URLs for reference
            COMMENT_IDS="${{ needs.collect-comments.outputs.comment_ids }}"
            COMMENT_COUNT=$(echo "$COMMENT_IDS" | tr ',' '\n' | grep -c .)
            
            # Build commit message with all comment references
            COMMIT_MSG=$(cat <<EOF
🤖 Agent: Batch applied fixes from $COMMENT_COUNT review comments

Triggered by comments: $COMMENT_IDS
EOF
)
            git commit -m "$COMMIT_MSG"
            git push origin HEAD --force
            
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            
            echo "success=true" >> $GITHUB_OUTPUT
            echo "comment_count=$COMMENT_COUNT" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "comment_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Post Summary Comment
        if: steps.commit.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse changed files and format as markdown list with links
          FILES_JSON='${{ steps.commit.outputs.changed_files }}'
          FILES_LIST=$(echo "$FILES_JSON" | jq -r '.[]' | while read file; do
            if [ -n "$file" ]; then
              echo "- [\`$file\`](https://github.com/${{ github.repository }}/blob/${{ steps.pr.outputs.head_ref }}/$file)"
            fi
          done)
          
          # Build list of trigger comment links
          COMMENT_IDS="${{ needs.collect-comments.outputs.comment_ids }}"
          COMMENT_LINKS=$(echo "$COMMENT_IDS" | tr ',' '\n' | while read id; do
            if [ -n "$id" ]; then
              echo "- [Comment #$id](https://github.com/${{ github.repository }}/pull/${{ github.event.number }}#discussioncomment-$id)"
            fi
          done)
          
          # Build the comment body
          COMMENT_BODY=$(cat <<EOF
### 🚀 Agent Workflow Complete! (Batch: ${{ steps.commit.outputs.comment_count }} comments)

**Triggered by:**
$COMMENT_LINKS

**Branch:** \`ai-fixes-${{ steps.pr.outputs.head_ref }}\`

**Files Modified:**
$FILES_LIST

**Commit:** [\`$(git rev-parse --short HEAD)\`](https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD))

---
*This is an automated response from the Jarvis agent. All batched review comments have been addressed in this commit.*
EOF
)
          
          # Post the comment
          gh pr comment ${{ github.event.number }} --body "$COMMENT_BODY"

  # Job 3: Optional - Cleanup processed trigger comments (add reaction to mark as done)
  mark-comments-processed:
    needs: [collect-comments, multi-iteration-fix]
    if: always() && needs.collect-comments.outputs.comment_ids != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add Rocket Reaction to Processed Comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_IDS="${{ needs.collect-comments.outputs.comment_ids }}"
          for id in $(echo "$COMMENT_IDS" | tr ',' ' '); do
            if [ -n "$id" ]; then
              # Add 🚀 reaction to indicate the comment was processed
              gh api repos/${{ github.repository }}/pulls/comments/$id/reactions \
                -f content=rocket || true
            fi
          done
