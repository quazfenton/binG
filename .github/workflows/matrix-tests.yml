name: 1. Matrix Tests & Coverage
on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
      - '.dockerignore'
      - '*.md'
  schedule:
    # Run full matrix on Saturdays at 2 AM UTC
    - cron: '0 2 * * 6'
jobs:
  node-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Don't cancel other matrix jobs if one fails
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Full matrix on schedule, latest only on push
        node-version: ${{ fromJSON(github.event_name == 'schedule' && '[18, 20, 22]' || '[22]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile --ignore-scripts || pnpm install --legacy-peer-deps
      - run: npm test --if-present
  python-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Don't cancel other matrix jobs if one fails
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Full matrix on schedule, latest only on push
        python-version: ${{ fromJSON(github.event_name == 'schedule' && '["3.10", "3.11", "3.12"]' || '["3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: |
          pip install pytest coverage
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: coverage run -m pytest
      - run: coverage report -m
