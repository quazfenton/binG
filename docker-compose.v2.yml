# Docker Compose for V2 Agent Architecture
# 
# Architecture:
# ┌─────────────┐     ┌──────────────┐     ┌─────────────┐
# │   NextJS    │────▶│Agent Gateway │────▶│Agent Worker │
# │   (app)    │     │  (gateway)   │     │  (worker)   │
# └─────────────┘     └──────────────┘     └─────────────┘
#                           │                    │
#                           │                    ▼
#                           │              ┌─────────────┐
#                           │              │MCP Server   │
#                           │              │(filesystem) │
#                           │              └─────────────┘
#                           │
#                           ▼
#                    ┌──────────────┐
#                    │    Redis     │
#                    │(queue/pubsub)│
#                    └──────────────┘
#                           ▲
#                           │
#                    ┌──────────────┐
#                    │  Nullclaw   │
#                    │ (automation) │
#                    └──────────────┘

services:
  # Main NextJS application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - ENCRYPTION_KEY=${ENCRYPTION_KEY:-build-temp-key-change-in-production}
        - JWT_SECRET=${JWT_SECRET:-build-temp-secret-change-in-production}
        - BLAXEL_SECRET_ENCRYPTION_KEY=${BLAXEL_SECRET_ENCRYPTION_KEY:-build-temp-blaxel-key-change}
        - NANGO_SECRET_KEY=${NANGO_SECRET_KEY:-build-temp-nango-key}
        - DATABASE_URL=${DATABASE_URL:-postgresql://build:build@localhost:5432/build}
    ports:
      - "5555:5555"
      - "8080:8080"
    volumes:
      - type: bind
        source: .
        target: /app
        consistency: cached
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - workspace_data:/workspace
      - pnpm_store:/root/.local/share/pnpm/store
      - pip_cache:/root/.cache/pip
      - npm_global:/root/.npm
      - opencode_data:/root/.opencode
      - nullclaw_data:/root/.nullclaw
    environment:
      - NODE_ENV=development
      - PORT=5555
      
      # V2 Agent Configuration
      - V2_AGENT_ENABLED=true
      - V2_GATEWAY_URL=http://gateway:3002
      - V2_WORKER_URL=http://worker:3003
      
      # MCP Configuration
      - MCP_ENABLED=true
      - MCP_CLI_PORT=8888
      
      # Redis for job queue
      - REDIS_URL=redis://redis:6379
      
      # Nullclaw Integration
      - NULLCLAW_ENABLED=${NULLCLAW_ENABLED:-true}
      - NULLCLAW_URL=${NULLCLAW_URL:-http://nullclaw:3000}
      - NULLCLAW_API_KEY=${NULLCLAW_API_KEY:-}
      - NULLCLAW_MODE=${NULLCLAW_MODE:-shared}
      
      - CHAT_AGENTIC_PIPELINE=auto
      - WORKFORCE_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
      gateway:
        condition: service_started
    networks:
      - bing-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`localhost`)"
      - "traefik.http.routers.app.entrypoints=web"

  # Agent Gateway - Session management + SSE + job creation
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - REDIS_URL=redis://redis:6379
      - WORKER_URL=http://worker:3003
      - MAX_CONCURRENT_JOBS=10
      - JOB_TIMEOUT_MS=300000
      - SESSION_TIMEOUT_MS=3600000
    volumes:
      - workspace_data:/workspace
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bing-network
    restart: unless-stopped

  # Agent Worker - Runs OpenCode engine loop
  worker:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - REDIS_URL=redis://redis:6379
      - MCP_SERVER_URL=http://mcp:8888
      - NULLCLAW_URL=http://nullclaw:3000
      - OPENCODE_MODEL=${OPENCODE_MODEL:-opencode/minimax-m2.5-free}
      - OPENCODE_MAX_STEPS=15
      - WORKER_CONCURRENCY=4
    volumes:
      - workspace_data:/workspace
      - opencode_data:/root/.opencode
    depends_on:
      redis:
        condition: service_healthy
      mcp:
        condition: service_started
    networks:
      - bing-network
    restart: unless-stopped

  # MCP Tool Server - Filesystem, memory, and other tools
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8888:8888"
    environment:
      - NODE_ENV=development
      - MCP_PORT=8888
      - WORKSPACE_ROOT=/workspace
      - VFS_ROOT=/workspace/vfs
    volumes:
      - workspace_data:/workspace
    networks:
      - bing-network
    restart: unless-stopped

  # Nullclaw - Automation tools (Discord, Telegram, browse)
  nullclaw:
    image: ghcr.io/nullclaw/nullclaw:latest
    ports:
      - "3001:3000"
    volumes:
      - ./nullclaw.config.yml:/app/config.yml:ro
      - nullclaw_config:/root/.nullclaw
    environment:
      - NULLCLAW_TIMEOUT=3600
      - ALLOWED_DOMAINS=openrouter.ai,api.discord.com,api.telegram.org
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    networks:
      - bing-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Redis - Job queue + PubSub for event streaming
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - bing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  bing-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  workspace_data:
    driver: local
  pnpm_store:
    driver: local
  pip_cache:
    driver: local
  npm_global:
    driver: local
  opencode_data:
    driver: local
  nullclaw_data:
    driver: local
  nullclaw_config:
    driver: local
  redis_data:
    driver: local
