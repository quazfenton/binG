# Docker Compose for V2 Agent Development
# Includes: Main app + Nullclaw container
# Uses pnpm for package management
# Optimized with persistent caching for Python, Node, and CLI tools

services:
  # Main binG application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5555:5555"
      - "8080:8080"
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock  # Allow app to manage Nullclaw container
      - workspace_data:/workspace
      - pnpm_store:/root/.local/share/pnpm/store  # Persist pnpm cache
      - pip_cache:/root/.cache/pip  # Persist Python pip cache (for other tools)
      - npm_global:/root/.npm  # Persist global npm packages
      - opencode_data:/root/.opencode  # Persist OpenCode data/cache
      - nullclaw_data:/root/.nullclaw  # Persist Nullclaw data/cache
    environment:
      - NODE_ENV=development
      - PORT=5555
      - OPENCODE_CONTAINERIZED=true
      - NULLCLAW_ENABLED=${NULLCLAW_ENABLED:-false}  # Disabled by default
      - NULLCLAW_NETWORK=bing-network
      - NULLCLAW_PORT=3001
      - NULLCLAW_URL=http://nullclaw:3000
      - PIP_CACHE_DIR=/root/.cache/pip
      - NPM_CONFIG_CACHE=/root/.npm
    depends_on:
      nullclaw:
        condition: service_healthy
        required: false  # App can run without Nullclaw
    networks:
      - bing-network

  # Nullclaw task assistant
  nullclaw:
    image: ghcr.io/nullclaw/nullclaw:latest
    ports:
      - "3001:3000"
    volumes:
      - ./nullclaw.config.yml:/app/config.yml:ro  # Mount config file
      - nullclaw_config:/root/.nullclaw  # Persist Nullclaw config
    environment:
      - NULLCLAW_TIMEOUT=3600
      - ALLOWED_DOMAINS=openrouter.ai,api.discord.com,api.telegram.org
      # Provider API keys (set in .env)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    networks:
      - bing-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    labels:
      - "traefik.enable=false"  # Not directly accessible

networks:
  bing-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  workspace_data:
    driver: local
  pnpm_store:
    driver: local
  pip_cache:
    driver: local
  npm_global:
    driver: local
  opencode_data:
    driver: local
  nullclaw_data:
    driver: local
  nullclaw_config:
    driver: local
