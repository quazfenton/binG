<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Static Ambient UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* LAYER 1: THE MEDIA (GIF/IMAGE) */
        .bg-media {
            position: fixed;
            inset: -5%; 
            z-index: 1;
            width: 110%;
            height: 110%;
            object-fit: cover;
            /* Heavy blur turns the GIF into a moving "aura" */
            filter: blur(100px) brightness(0.3) saturate(1.2);
            pointer-events: none;
            /* Slow drift animation so the background shifts slightly */
            animation: drift 30s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.1) translate(-2%, -2%); }
        }

        /* LAYER 2: THE FIXED CENTER GLOW (Vignette) */
        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 2;
            /* Fixed glow at the center/top-center to match your image */
            background: radial-gradient(
                circle at 50% 45%, 
                rgba(35, 35, 45, 0.4) 0%, 
                rgba(5, 5, 5, 1) 75%
            );
            pointer-events: none;
        }

        /* LAYER 3: THE NOISE TEXTURE */
        .bg-noise {
            position: fixed;
            inset: 0;
            z-index: 3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.08; 
            mix-blend-mode: overlay;
            pointer-events: none;
        }

        /* UI CONTENT */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 620px;
            padding: 20px;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 18px 24px;
            font-size: 18px;
            color: #fff;
            outline: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: #555;
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

    </style>
</head>
<body>

    <img class="bg-media" src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXhsem5oZzR4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JnB0PWEmZWw9ZyZjdD1n/3o7TKMGpxx8G3VqzPq/giphy.gif" alt="">
    
    <div class="bg-overlay"></div>

    <div class="bg-noise"></div>

    <div class="content">
        <input type="text" class="search-input" placeholder="Type something..." spellcheck="false">
    </div>

</body>
</html>
