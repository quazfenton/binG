# Prometheus Configuration for binG Backend
# Scrapes metrics from all binG services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bing-backend'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional)
# rule_files:
#   - "first_rules.yml"
#   - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # ===========================================
  # binG Backend Application
  # ===========================================
  - job_name: 'bing-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # ===========================================
  # Prometheus Self-Monitoring
  # ===========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s

  # ===========================================
  # Node Exporter (System Metrics)
  # ===========================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    metric_relabel_configs:
      # Drop unnecessary metrics to reduce storage
      - source_labels: [__name__]
        regex: 'node_(boot_time|cpu_guest|cpufreq|diskstats|md|netstat|softnet|time|timex|uname|vmstat).*'
        action: drop

  # ===========================================
  # MinIO Metrics
  # ===========================================
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: '/minio/v2/metrics/cluster'
    scrape_interval: 30s
    bearer_token: ${MINIO_ACCESS_KEY:-minioadmin}

  # ===========================================
  # Grafana Metrics
  # ===========================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    scrape_interval: 30s

  # ===========================================
  # Scheduler Service
  # ===========================================
  - job_name: 'bing-scheduler'
    static_configs:
      - targets: ['scheduler:3007']
    metrics_path: '/stats'
    scrape_interval: 15s

  # ===========================================
  # OpenSandbox Server
  # ===========================================
  - job_name: 'opensandbox'
    static_configs:
      - targets: ['opensandbox:8080']
    metrics_path: '/health'
    scrape_interval: 15s

  # ===========================================
  # Sandbox Pool
  # ===========================================
  - job_name: 'sandbox-pool'
    static_configs:
      - targets: ['sandbox:3005']
    metrics_path: '/stats'
    scrape_interval: 15s

  # ===========================================
  # Agent Gateway
  # ===========================================
  - job_name: 'agent-gateway'
    static_configs:
      - targets: ['gateway:3002']
    metrics_path: '/health'
    scrape_interval: 15s

  # ===========================================
  # Nullclaw
  # ===========================================
  - job_name: 'nullclaw'
    static_configs:
      - targets: ['nullclaw:3000']
    metrics_path: '/health'
    scrape_interval: 15s

  # ===========================================
  # Redis Metrics (if enabled)
  # ===========================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
  #   scrape_interval: 15s

# ===========================================
# Remote Write (Optional - for long-term storage)
