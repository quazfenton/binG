<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quaz Desktop — Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #09090b; color: #e4e4e7;
    }
    .container {
      max-width: 540px; padding: 2.5rem; width: 100%;
      background: #18181b; border: 1px solid #27272a;
      border-radius: 12px;
    }
    .header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .logo { font-size: 1.5rem; }
    h1 { font-size: 1.25rem; font-weight: 600; }

    .status-section { text-align: center; margin-bottom: 1.5rem; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #27272a;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { color: #a1a1aa; font-size: 0.875rem; margin-bottom: 0.75rem; }
    .progress-bar {
      height: 4px; background: #27272a; border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #3b82f6; border-radius: 2px;
      transition: width 0.5s ease;
    }

    .checks { margin: 1.5rem 0; }
    .check-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0; font-size: 0.85rem; color: #a1a1aa;
    }
    .check-icon { width: 18px; text-align: center; flex-shrink: 0; }
    .check-ok { color: #4ade80; }
    .check-fail { color: #f87171; }
    .check-pending { color: #facc15; }

    .actions { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .btn {
      padding: 0.6rem 1.2rem; border: none; border-radius: 6px;
      font-size: 0.85rem; cursor: pointer; font-weight: 500;
      transition: background 0.15s;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #27272a; color: #e4e4e7; }
    .btn-secondary:hover { background: #3f3f46; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .detail-log {
      margin-top: 1rem; padding: 0.75rem; background: #09090b;
      border-radius: 6px; font-family: monospace; font-size: 0.75rem;
      color: #71717a; max-height: 120px; overflow-y: auto;
      display: none;
    }
    .detail-log.visible { display: block; }
    .detail-log .ok { color: #4ade80; }
    .detail-log .err { color: #f87171; }
    .detail-log .info { color: #60a5fa; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">🚀</span>
      <h1>Quaz Desktop</h1>
    </div>

    <!-- Loading state -->
    <div id="loadingSection">
      <div class="status-section">
        <div class="spinner"></div>
        <div class="status-text" id="statusText">Starting Next.js server...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Checks display -->
    <div class="checks">
      <div class="check-item" id="checkNode">
        <span class="check-icon check-pending">◌</span>
        <span>Checking Node.js...</span>
      </div>
      <div class="check-item" id="checkSidecar">
        <span class="check-icon check-pending">◌</span>
        <span>Starting Next.js sidecar...</span>
      </div>
      <div class="check-item" id="checkInvoke">
        <span class="check-icon check-pending">◌</span>
        <span>Testing Tauri invoke commands...</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-secondary hidden" id="showLogBtn" onclick="toggleLog()">Show Details</button>
      <button class="btn btn-secondary hidden" id="continueBtn" onclick="continueAnyway()">
        Continue with Basic Features
      </button>
    </div>

    <div class="detail-log" id="detailLog"></div>
  </div>

  <script>
    const sidecarConfig = window.__OPENCODE_SIDECAR__ || null;
    // Validate port: must be a positive integer in the ephemeral range.
    // Prevents misuse if __OPENCODE_SIDECAR__ is tampered with via devtools.
    const rawPort = sidecarConfig?.port;
    // Tauri may inject the port as a string (e.g. "3000"). Parse it first.
    const numericPort = typeof rawPort === 'string' ? parseInt(rawPort, 10) : rawPort;
    const sidecarPort = (Number.isInteger(numericPort) && numericPort > 0 && numericPort <= 65535)
      ? numericPort
      : 3000;
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const detailLog = document.getElementById('detailLog');
    const continueBtn = document.getElementById('continueBtn');
    const showLogBtn = document.getElementById('showLogBtn');
    let logLines = [];

    function addLog(msg, cls = '') {
      logLines.push(`<div class="${cls}">${msg}</div>`);
      detailLog.innerHTML = logLines.join('');
      detailLog.scrollTop = detailLog.scrollHeight;
    }

    function setCheck(id, icon, text, cls) {
      const el = document.getElementById(id);
      el.querySelector('.check-icon').textContent = icon;
      el.querySelector('.check-icon').className = 'check-icon ' + cls;
      el.querySelector('span:last-child').textContent = text;
    }

    function toggleLog() {
      detailLog.classList.toggle('visible');
      showLogBtn.textContent = detailLog.classList.contains('visible') ? 'Hide Details' : 'Show Details';
    }

    async function tryInvoke() {
      try {
        const tauri = window.__TAURI__;
        if (!tauri || !tauri.core) {
          addLog('Tauri API not available', 'err');
          return false;
        }
        const result = await tauri.core.invoke('get_system_info', {});
        if (result) {
          addLog(`System info: platform=${result.os || 'unknown'}, arch=${result.arch || 'unknown'}`, 'ok');
          return true;
        }
        return false;
      } catch (e) {
        addLog(`Invoke test failed: ${e.message || e}`, 'err');
        return false;
      }
    }

    async function init() {
      addLog('App initialized', 'info');

      if (!sidecarConfig) {
        // Non-desktop fallback: keep the legacy Node check for manual runs.
        try {
          const tauri = window.__TAURI__;
          if (!tauri || !tauri.core) {
            addLog('Tauri API not available', 'err');
            showFallback();
            return;
          }
          setCheck('checkNode', '✓', 'Tauri bridge available', 'check-ok');
        } catch {
          addLog('Tauri bridge unavailable', 'err');
          showFallback();
          return;
        }
      } else {
        addLog(`Detected injected sidecar config on port ${sidecarPort}`, 'info');
        setCheck('checkNode', '✓', 'Desktop bootstrap ready', 'check-ok');
      }

      // 2. Wait for sidecar (the Rust code is already trying to start it)
      addLog(`Waiting for Next.js server on port ${sidecarPort}...`, 'info');
      
      // Poll the sidecar every 1s for a short grace period, then fall back
      // to the lightweight desktop shell so startup is usable immediately.
      let attempts = 0;
      const maxAttempts = 5;
      const pollInterval = setInterval(async () => {
        attempts++;
        progressFill.style.width = `${Math.min((attempts / maxAttempts) * 100, 100)}%`;
        statusText.textContent = `Starting Next.js... (${attempts}s / ${maxAttempts}s)`;

        if (attempts % 10 === 0) {
          addLog(`Still waiting... (${attempts}s)`, 'info');
        }

        try {
          const resp = await fetch(`http://127.0.0.1:${sidecarPort}/`, { 
            method: 'HEAD', 
            mode: 'no-cors',
            signal: AbortSignal.timeout(2000)
          });
          // no-cors mode returns opaque response, but if it doesn't throw, the server is up
          clearInterval(pollInterval);
          addLog('Next.js server is responding!', 'ok');
          setCheck('checkSidecar', '✓', 'Next.js sidecar running', 'check-ok');
          statusText.textContent = 'Connected! Loading app...';
          progressFill.style.width = '100%';

          // Test invoke commands
          const invokeOk = await tryInvoke();
          setCheck('checkInvoke', invokeOk ? '✓' : '✗', 
            invokeOk ? 'Tauri commands working' : 'Tauri cmds unavailable',
            invokeOk ? 'check-ok' : 'check-fail');

          // Give it 1s then redirect
          setTimeout(() => {
            window.location.href = `http://127.0.0.1:${sidecarPort}/`;
          }, 1000);
        } catch (e) {
          // Server not ready yet
          if (attempts >= maxAttempts) {
            clearInterval(pollInterval);
            addLog('Sidecar not ready yet; continuing in basic mode', 'err');
            setCheck('checkSidecar', '✗', 'Sidecar not ready', 'check-fail');
            showFallback();
          }
        }
      }, 1000);

      // Also test invoke commands in parallel
      const invokeOk = await tryInvoke();
      setCheck('checkInvoke', invokeOk ? '✓' : '~',
        invokeOk ? 'Tauri commands working' : 'Tauri cmds unavailable (sidecar needed)',
        invokeOk ? 'check-ok' : 'check-pending');

      showLogBtn.classList.remove('hidden');
    }

    function showFallback() {
      statusText.textContent = 'Sidecar unavailable — basic features work';
      progressFill.style.width = '100%';
      progressFill.style.background = '#f59e0b';
      continueBtn.classList.remove('hidden');
      showLogBtn.classList.remove('hidden');
    }

    function continueAnyway() {
      addLog('User chose to continue with basic features', 'info');
      statusText.textContent = 'Basic mode: filesystem, PTY, and checkpoints available';
      const url = `http://127.0.0.1:${sidecarPort}/`;
      fetch(url, { method: 'HEAD', mode: 'no-cors', signal: AbortSignal.timeout(2000) })
        .then(() => {
          window.location.href = url;
        })
        .catch(() => {
          addLog('Full app is still starting; staying in basic mode for now', 'info');
        });
    }

    // Start initialization
    init();
  </script>
</body>
</html>
