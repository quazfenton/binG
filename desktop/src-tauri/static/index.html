<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    .loader {
      width: 40px; height: 40px; border: 2px solid #27272a;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .drag-region {
      position: absolute; top: 0; left: 0; width: 100%; height: 32px;
      -webkit-app-region: drag;
    }
  </style>
</head>
<body>
  <div class="drag-region" data-tauri-drag-region></div>
  <div class="loader"></div>

  <script>
    const sidecarConfig = window.__SIDECAR_CONFIG__ || null;
    const sidecarPort = sidecarConfig?.port || 3000;
    
    async function checkServer() {
      try {
        const resp = await fetch(`http://127.0.0.1:${sidecarPort}/api/health`, {
          method: 'GET',
          signal: AbortSignal.timeout(2000)
        });
        if (!resp.ok) throw new Error(`Health check failed: ${resp.status}`);
        const health = await resp.json();
        if (!health || !health.version) throw new Error('Invalid health response');
        window.location.href = `http://127.0.0.1:${sidecarPort}/?sid_tkn=${sidecarConfig.token}`;
      } catch (e) {
        setTimeout(checkServer, 1000);
      }
    }

    // Start checking immediately
    checkServer();
  </script>
</body>
</html>
