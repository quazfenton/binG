# Experience extraction prompts for Training-Free GRPO
# These prompts guide the LLM in extracting useful experiences from practice trajectories.

summarize_correct:
  system: |
    You are an expert at analyzing successful problem-solving trajectories.
    Your goal is to extract the key insights and strategies that led to success.
  user: |
    Problem: {problem}
    Correct Answer: {correct_answer}

    Below are {num} successful solution trajectories:
    {trajectories}

    Analyze these solutions and extract the key strategies, patterns, and insights that led to success.
    Focus on generalizable principles rather than specific steps.

summarize_wrong:
  system: |
    You are an expert at analyzing failed problem-solving attempts.
    Your goal is to identify common pitfalls and mistakes.
  user: |
    Problem: {problem}
    Correct Answer: {correct_answer}

    Below are {num} failed solution attempts:
    {trajectories}

    Analyze these failed attempts and identify:
    1. Common mistakes or pitfalls
    2. Where the approaches went wrong
    3. What should be avoided in future attempts

group_advantage:
  system: |
    You are an expert at extracting general guidelines from multiple problem-solving experiences.
    Your goal is to identify patterns and create actionable advice.
  user: |
    Agent Objective: {agent_objective}

    Below are summaries of multiple problem-solving attempts across different problems:
    {problems}

    Extract {num_experiences} concise, generalizable experiences/guidelines that would help the agent
    perform better on similar problems in the future.

    Each experience should be:
    - Actionable: gives clear direction on what to do or avoid
    - General: applies beyond a single specific problem
    - Concise: no more than 2-3 sentences

    Return as a JSON array:
    [
      {{"experience": "The guideline text here", "problem_type": "category"}},
      ...
    ]

group_update:
  system: |
    You are an expert at critiquing and refining learning experiences.
  user: |
    Existing experiences:
    {existing}

    New proposed experience:
    {new_experience}

    Problem type: {problem_type}

    Critique this new experience:
    1. Is it redundant with existing experiences?
    2. Is it actionable and specific enough?
    3. Does it generalize beyond the specific instances it came from?
    4. How could it be improved?

generate_final:
  system: |
    You are an expert at synthesizing learning experiences into clear, actionable guidelines.
  user: |
    Learning Objective: {learning_objective}

    Proposed experience:
    {experience}

    Critique:
    {critique}

    Based on the proposed experience and the critique, generate a final, refined version that is:
    1. Clear and unambiguous
    2. Actionable — tells the agent what to do
    3. Concise — no more than 2-3 sentences
    4. General — applicable to a range of similar problems

judge:
  system: |
    You are a fair judge evaluating how well a response answers a question.
    Compare the response to the ground truth and assign a score.
  user: |
    Question: {question}
    Ground Truth: {ground_truth}
    Response: {response}

    Score the response from 0 to 100 based on how well it matches the ground truth in substance.
    Consider:
    - Does it contain the same key information?
    - Is it factually correct?
    - Is it complete?

    Respond with just the numeric score (0-100) and a brief reason.
