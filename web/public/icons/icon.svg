<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGradient)"/>
  
  <!-- AI/Chat icon - stylized brain/circuit -->
  <g filter="url(#shadow)">
    <!-- Center node -->
    <circle cx="256" cy="256" r="60" fill="white" fill-opacity="0.95"/>
    
    <!-- Orbiting nodes -->
    <circle cx="256" cy="140" r="28" fill="white" fill-opacity="0.9"/>
    <circle cx="356" cy="220" r="28" fill="white" fill-opacity="0.9"/>
    <circle cx="356" cy="340" r="28" fill="white" fill-opacity="0.9"/>
    <circle cx="256" cy="420" r="28" fill="white" fill-opacity="0.9"/>
    <circle cx="156" cy="340" r="28" fill="white" fill-opacity="0.9"/>
    <circle cx="156" cy="220" r="28" fill="white" fill-opacity="0.9"/>
    
    <!-- Connection lines -->
    <line x1="256" y1="200" x2="256" y2="168" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
    <line x1="296" y1="236" x2="336" y2="240" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
    <line x1="296" y1="276" x2="336" y2="320" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
    <line x1="256" y1="316" x2="256" y2="392" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
    <line x1="216" y1="276" x2="176" y2="320" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
    <line x1="216" y1="236" x2="176" y2="240" stroke="white" stroke-width="4" stroke-opacity="0.6"/>
    
    <!-- Outer ring connections -->
    <path d="M256 168 L256 140" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
    <path d="M336 240 L356 220" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
    <path d="M336 320 L356 340" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
    <path d="M256 392 L256 420" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
    <path d="M176 320 L156 340" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
    <path d="M176 240 L156 220" stroke="white" stroke-width="3" stroke-opacity="0.4"/>
  </g>
  
  <!-- Sparkle accents -->
  <path d="M420 100 L428 116 L444 124 L428 132 L420 148 L412 132 L396 124 L412 116 L420 100Z" fill="white" fill-opacity="0.6"/>
  <path d="M80 380 L86 392 L98 398 L86 404 L80 416 L74 404 L62 398 L74 392 L80 380Z" fill="white" fill-opacity="0.5"/>
</svg>
